<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chivas NFC</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0A0A0A, #1a0000);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.card {
    background: linear-gradient(145deg, #C8102E, #002F6C);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 25px rgba(200,16,46,0.8);
}

.player-img {
    width: 100%;
    max-width: 250px;
    border-radius: 15px;
}

.player-name {
    font-size: 28px;
    font-weight: bold;
    margin-top: 10px;
}

.player-number {
    font-size: 50px;
    color: #fff;
}

.btn {
    display: block;
    margin: 10px auto;
    padding: 15px;
    width: 90%;
    max-width: 400px;
    background: #C8102E;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #a50d25;
    transform: scale(1.03);
}

.btn-premium {
    display: block;
    width: 90%;
    max-width: 320px;
    margin: 25px auto;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 16px;
    color: #111;
    text-decoration: none;
    border-radius: 15px;
    position: relative;
    overflow: hidden;

    /* Fondo dorado */
    background: linear-gradient(
        135deg,
        #FFD700,
        #FFC300,
        #FFB300,
        #FFD700
    );

    /* Sombra */
    box-shadow:
        0 0 15px rgba(255, 215, 0, 0.6),
        0 0 30px rgba(255, 215, 0, 0.4);

    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* EFECTO HOVER */
.btn-premium:hover {
    transform: scale(1.05);
    box-shadow:
        0 0 25px rgba(255, 215, 0, 0.9),
        0 0 50px rgba(255, 215, 0, 0.6);
}

/* BRILLO ANIMADO */
.btn-premium::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.4);
    transform: skewX(-20deg);
    animation: brillo 3s infinite;
}

/* ANIMACIÓN */
@keyframes brillo {
    0% {
        left: -75%;
    }
    100% {
        left: 125%;
    }
}

.separador {
    width: 100%;
    height: 8px;
    background: linear-gradient(
        90deg,
        #C8102E,
        #FFFFFF,
        #002F6C
    );
    margin: 25px 0;
    border-radius: 4px;
    box-shadow: 0 0 10px rgba(200,16,46,0.5);
}

.card-fc {
    position: relative;
    width: 90%;
    max-width: 320px;
    height: 480px;
    margin: 20px auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(200,16,46,0.8);
}

/* FONDO */
.card-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        linear-gradient(135deg, rgba(200,16,46,0.9), rgba(0,47,108,0.9)),
        repeating-linear-gradient(
            45deg,
            #C8102E,
            #C8102E 20px,
            #FFFFFF 20px,
            #FFFFFF 40px
        );
    z-index: 1;
}

/* JUGADOR */
.card-player {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    max-height: 320px;
    object-fit: contain;
    z-index: 2;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
}

/* INFO */
.card-info {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.8));
    z-index: 3;
}

/* NOMBRE */
.card-name {
    font-size: 20px;
    font-weight: bold;
}

/* DETALLES */
.card-details {
    display: flex;
    justify-content: center;
    gap: 15px;
    font-size: 16px;
    margin-top: 5px;
}

    .card-details span {
    background: rgba(0,0,0,0.6);
    padding: 4px 10px;
    border-radius: 8px;
}

@media (min-width: 768px) {
    .container {
        max-width: 600px;
        margin: auto;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="card-fc">

    <div class="card-bg"></div>

    <img id="player-img" class="card-player" src="">

    <div class="card-info">
        <div id="player-name" class="card-name"></div>
        <div class="card-details">
            <span id="player-position"></span>
            <span id="player-number"></span>
        </div>
    </div>

</div>

    <!-- BOTONES PRINCIPALES -->
    <div id="premium-container">

        <a id="btn-premium-1" class="btn-premium" target="_blank">
            ⭐ Perfil Premium
        </a>
    
        <a id="btn-premium-2" class="btn-premium" target="_blank">
            🎥 Mejores Jugadas
        </a>

    </div>
   
    <div class="separador"></div>
    
    <a class="btn" href="https://www.chivasdecorazon.com.mx/" target="_blank">
        🌐 Sitio Oficial
    </a>

    <a class="btn" href="https://www.youtube.com/@chivas" target="_blank">
        ▶️ YouTube Oficial
    </a>

    <a class="btn" href="https://www.instagram.com/chivas/" target="_blank">
        📸 Instagram Oficial
    </a>

      <a class="btn" href="https://boletomovil.com/chivas" target="_blank">
        🌎 Venta de Boletos
    </a>

     <a class="btn" href="https://tiendachivas.com.mx/" target="_blank">
        🛒 Tienda Oficial
    </a>

    <div class="separador"></div>

    <a class="btn" href="https://www.google.com/search?q=chivas+proximo+partido" target="_blank">
        📅 Próximo Partido
    </a>

    <a class="btn" href="https://www.google.com/search?q=chivas+calendario" target="_blank">
        🗓️ Calendario de Partidos
    </a>

    <a class="btn" href="https://www.google.com/search?q=tabla+liga+mx" target="_blank">
        📊 Tabla Liga MX
    </a>  

    <div class="separador"></div>
    <!-- NUEVOS BOTONES -->
    <a class="btn" href="https://www.google.com/search?q=palmares+chivas+guadalajara" target="_blank">
        🔥 Palmarés del Equipo
    </a>

    <a class="btn" href="https://www.google.com/search?q=chivas+vs+america+historial" target="_blank">
        ⚔️ Clásico Nacional
    </a>

      <a class="btn" href="https://www.google.com/search?q=chivas+vs+atlas+historial" target="_blank">
        ⚔️ Clásico Tapatío
    </a>

   

</div>

<script>
const jugadores = {
    agonzalez: {
        nombre: "Armando González",
        numero: "34",
        posicion: "DEL",
        imagen: "agonzalez.jpg",
        premiumLinks: [
        "https://www.google.com/search?q=armando+gonzalez+chivas+jugador+perfil+estadisticas",
        "https://www.google.com/search?q=armando+gonzalez+goles+chivas"
        ]
    },
    pulido: {
        nombre: "Alan Pulido",
        numero: "9",
        posicion: "DEL",
        imagen: "pulido.jpg"
    }
};

    // BOTONES PREMIUM DINÁMICOS
    document.getElementById("btn-premium-1").href = jugadores[jugador].premiumLinks[0];
    document.getElementById("btn-premium-2").href = jugadores[jugador].premiumLinks[1];

const params = new URLSearchParams(window.location.search);
const jugador = params.get("jugador");

if (jugadores[jugador]) {
    document.getElementById("player-name").innerText = jugadores[jugador].nombre;
    document.getElementById("player-number").innerText = jugadores[jugador].numero;
    document.getElementById("player-position").innerText = jugadores[jugador].posicion;
    document.getElementById("player-img").src = jugadores[jugador].imagen;
} else {
    document.getElementById("player-name").innerText = "Chivas";
    document.getElementById("player-number").innerText = "🔥";
}
</script>

</body>
</html>
