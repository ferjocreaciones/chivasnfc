<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chivas NFC</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0A0A0A, #1a0000);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.card {
    background: linear-gradient(145deg, #C8102E, #002F6C);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 25px rgba(200,16,46,0.8);
}

.player-img {
    width: 100%;
    max-width: 250px;
    border-radius: 15px;
}

.player-name {
    font-size: 28px;
    font-weight: bold;
    margin-top: 10px;
}

.player-number {
    font-size: 50px;
    color: #fff;
}

.btn {
    display: block;
    margin: 10px auto;
    padding: 15px;
    width: 90%;
    max-width: 400px;
    background: #C8102E;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #a50d25;
    transform: scale(1.03);
}

.card-fc {
    position: relative;
    width: 90%;
    max-width: 320px;
    height: 480px;
    margin: 20px auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(200,16,46,0.8);
}

/* FONDO */
.card-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        linear-gradient(135deg, rgba(200,16,46,0.9), rgba(0,47,108,0.9)),
        repeating-linear-gradient(
            45deg,
            #C8102E,
            #C8102E 20px,
            #FFFFFF 20px,
            #FFFFFF 40px
        );
    z-index: 1;
}

/* JUGADOR */
.card-player {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    max-height: 320px;
    object-fit: contain;
    z-index: 2;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
}

/* INFO */
.card-info {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.8));
    z-index: 3;
}

/* NOMBRE */
.card-name {
    font-size: 20px;
    font-weight: bold;
}

/* DETALLES */
.card-details {
    display: flex;
    justify-content: space-between;
    font-size: 16px;
    margin-top: 5px;
}

@media (min-width: 768px) {
    .container {
        max-width: 600px;
        margin: auto;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="card-fc">

    <div class="card-bg"></div>

    <img id="player-img" class="card-player" src="">

    <div class="card-info">
        <div id="player-name" class="card-name"></div>
        <div class="card-details">
            <span id="player-position"></span>
            <span id="player-number"></span>
        </div>
    </div>

</div>

    <!-- BOTONES PRINCIPALES -->
    <a class="btn" href="https://www.chivasdecorazon.com.mx/" target="_blank">
        🌐 Sitio Oficial
    </a>

    <a class="btn" href="https://www.youtube.com/@chivas" target="_blank">
        ▶️ YouTube Oficial
    </a>

    <a class="btn" href="https://www.instagram.com/chivas/" target="_blank">
        📸 Instagram Oficial
    </a>

    <a class="btn" href="https://www.chivasdecorazon.com.mx/es/calendario" target="_blank">
        📅 Próximo Partido
    </a>

    <a class="btn" href="https://www.chivasdecorazon.com.mx/es/calendario" target="_blank">
        🗓️ Calendario de Partidos
    </a>

    <a class="btn" href="https://ligamx.net/" target="_blank">
        📊 Tabla Liga MX
    </a>

    <a class="btn" href="https://www.concacaf.com/" target="_blank">
        🌎 Otros Torneos
    </a>

    <!-- NUEVOS BOTONES -->
    <a class="btn" href="https://es.wikipedia.org/wiki/Cl%C3%A1sico_Nacional_(M%C3%A9xico)" target="_blank">
        🔥 Clásico vs América
    </a>

    <a class="btn" href="https://es.wikipedia.org/wiki/Cl%C3%A1sico_Tapat%C3%ADo" target="_blank">
        ⚔️ Clásico Tapatío
    </a>

    <a class="btn" href="https://tiendachivas.com.mx/" target="_blank">
        🛒 Tienda Oficial
    </a>

</div>

<script>
const jugadores = {
    agonzalez: {
        nombre: "Armando González",
        numero: "34",
        posicion: "DEL",
        imagen: "hormiga.jpg"
    },
    pulido: {
        nombre: "Alan Pulido",
        numero: "9",
        posicion: "DEL",
        imagen: "pulido.jpg"
    }
};

const params = new URLSearchParams(window.location.search);
const jugador = params.get("jugador");

if (jugadores[jugador]) {
    document.getElementById("player-name").innerText = jugadores[jugador].nombre;
    document.getElementById("player-number").innerText = jugadores[jugador].numero;
    document.getElementById("player-position").innerText = jugadores[jugador].posicion;
    document.getElementById("player-img").src = jugadores[jugador].imagen;
} else {
    document.getElementById("player-name").innerText = "Chivas";
    document.getElementById("player-number").innerText = "🔥";
}
</script>

</body>
</html>
